<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TV Top 5</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="data:,"></head><body class="tv-page"><div class="tv-wrap"><div class="tv-topbar"><div><div class="badgex">TV Mode</div><h1 style="margin:.55rem 0 0;font-size:2.4rem">🏆 شاشة Top 5</h1></div><div class="tv-clock"><span class="realtime-dot"></span> مباشر • <span id="clock">—</span></div></div><div id="tvWinner" style="margin-bottom:20px"></div><div id="tvGrid" class="tv-grid"></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js?v=5"></script><script src="assets/js/supabase-client.js?v=5"></script><script src="assets/js/common.js?v=5"></script><script>
function updateClock(){$("clock").textContent=dt(new Date().toISOString());}
document.addEventListener("DOMContentLoaded", async ()=>{updateClock();setInterval(updateClock,1000);await loadTV();subscribeRealtime(async ()=>{await loadTV();});});
async function loadTV(){try{const {data,error}=await db.from("leaderboard").select("*").order("rank_order",{ascending:true}).limit(5);if(error) throw error;const rows=data||[];const ann=currentLeaderAnnouncement(rows);$("tvWinner").innerHTML=ann?`<div class="banner-winner"><div><div class="banner-title">🎯 ${esc(ann.title)}</div><div class="banner-sub">${esc(ann.subtitle)}</div></div><div class="reward">${esc(ann.reward)}</div></div>`:"";$("tvGrid").innerHTML=rows.map((r,i)=>`<article class="tv-card"><div class="tv-rank">#${i+1}</div><div class="tv-name">${esc(r.full_name)}</div><div class="tv-points">${r.total_points} نقطة</div><div class="small" style="color:#cbd5e1;margin-top:12px">${r.predictions_count} توقع • ${r.exact_scores_count} دقيقة</div><div class="tv-reward">${reward(i+1)}</div></article>`).join("");}catch(e){$("tvGrid").innerHTML=`<div class="card">تعذر تحميل شاشة TV.</div>`;console.error(e);}}
</script></body></html>
