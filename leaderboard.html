<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الترتيب المباشر</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css"></head>
<body>
<header class="hero"><div class="wrap row"><div><div class="badgex">Live Leaderboard</div><h1>🏆 الترتيب المباشر</h1><p>يتحدث تلقائيًا كل 15 ثانية.</p></div><nav class="nav row"><a href="index.html">⚽ التوقعات</a><a href="admin.html">🛠️ المشرف</a></nav></div></header>
<main class="wrap">
<div id="msg"></div>
<section class="grid4">
  <article class="card stat"><div class="label">عدد المشاركين</div><div class="value" id="pc">—</div></article>
  <article class="card stat"><div class="label">المتصدر الحالي</div><div class="value" id="leader">—</div></article>
  <article class="card stat"><div class="label">أعلى نقاط</div><div class="value" id="pts">—</div></article>
  <article class="card stat" style="text-align:center"><div class="label">QR Code</div><img id="boardQr" class="qr" alt="QR"></article>
</section>
<div class="headline"><div><h2>Top 5</h2><p class="sub">الأول 30 ريال، الثاني 20 ريال، الثالث 10 ريال.</p></div><div class="row"><button id="refresh" class="btn btn-soft">تحديث الآن</button><button id="csv" class="btn btn-primary">تصدير CSV</button></div></div>
<div id="top5" class="top5"></div>
<section class="card" style="margin-top:14px"><div class="tablewrap"><table class="tbl"><thead><tr><th>المركز</th><th>الاسم</th><th>النقاط</th><th>عدد التوقعات</th><th>النتائج الدقيقة</th><th>الأشواط/الترجيح</th><th>الجائزة</th></tr></thead><tbody id="tbody"></tbody></table></div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script><script src="assets/js/supabase-client.js"></script><script src="assets/js/common.js"></script>
<script>
let rows=[];
document.addEventListener("DOMContentLoaded", async ()=>{ setQR("boardQr"); $("refresh").onclick=loadBoard; $("csv").onclick=download; await loadBoard(); setInterval(loadBoard, window.APP_CONFIG.AUTO_REFRESH_MS||15000); });
async function loadBoard(){
  try{
    const {data,error}=await db.from("leaderboard").select("*").order("rank_order",{ascending:true}); if(error) throw error; rows=data||[];
    $("pc").textContent=rows.length; $("leader").textContent=rows[0]?.full_name||"—"; $("pts").textContent=rows[0]?.total_points ?? "—";
    $("top5").innerHTML = rows.length ? rows.slice(0,5).map((r,i)=>`<article class="card topcard"><div class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':'rx'}">${i+1}</div><div style="flex:1"><div style="font-weight:800;font-size:1.08rem">${esc(r.full_name)}</div><div class="small">${r.total_points} نقطة • ${r.predictions_count} توقع</div></div><div class="reward">${reward(i+1)}</div></article>`).join("") : `<div class="card">لا يوجد مشاركون بعد.</div>`;
    $("tbody").innerHTML = rows.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.full_name)}</td><td>${r.total_points}</td><td>${r.predictions_count}</td><td>${r.exact_scores_count}</td><td>${r.special_hits_count}</td><td>${reward(i+1)}</td></tr>`).join("");
  }catch(e){ $("msg").innerHTML=alertBox("danger","تعذر تحميل الترتيب المباشر."); console.error(e); }
}
function download(){
  const out=[["المركز","الاسم","النقاط","عدد التوقعات","النتائج الدقيقة","الأشواط/الترجيح","الجائزة"]];
  rows.forEach((r,i)=>out.push([i+1,r.full_name,r.total_points,r.predictions_count,r.exact_scores_count,r.special_hits_count,reward(i+1)]));
  csv("ucl-leaderboard.csv", out);
}
</script></body></html>
