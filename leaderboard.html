<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الترتيب المباشر</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">⚽ توقعات دوري الأبطال</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="index.html">التوقعات</a>
        <a class="btn btn-outline-dark btn-sm" href="admin.html">المشرف</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
      <div>
        <h1 class="h3 mb-1">الترتيب المباشر</h1>
        <div class="text-secondary small">يتم التحديث تلقائيًا كل 15 ثانية.</div>
      </div>
      <div class="d-flex gap-2">
        <button id="printBtn" class="btn btn-outline-secondary">طباعة / PDF</button>
        <button id="exportCsvBtn" class="btn btn-success">تصدير CSV</button>
      </div>
    </div>

    <section class="mb-4">
      <div id="top5Cards" class="row g-3"></div>
    </section>

    <section class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="table-responsive">
              <table class="table align-middle mb-0">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>المشارك</th>
                    <th>النقاط</th>
                    <th>نتائج دقيقة</th>
                    <th>توقعات قريبة</th>
                    <th>مسافة الخطأ</th>
                  </tr>
                </thead>
                <tbody id="leaderboardBody">
                  <tr><td colspan="6" class="text-center text-secondary py-4">جاري التحميل...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="quick-card h-100 p-3">
              <h2 class="h5 mb-3">الجوائز</h2>
              <div id="rewardsList" class="vstack gap-2"></div>
              <hr>
              <div class="small text-secondary mb-2">الدخول السريع</div>
              <div id="leaderQr" class="qr-box mb-2"></div>
              <div class="small text-secondary">امسح الكود للعودة إلى صفحة التوقعات.</div>
              <hr>
              <div class="small text-secondary">آخر تحديث: <span id="lastRefresh">—</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/leaderboard.js"></script>
</body>
</html>
