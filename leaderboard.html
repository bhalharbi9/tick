<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الترتيب المباشر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="page-bg">
  <header class="hero-bar">
    <div class="container-xl py-4">
      <div class="hero-wrap">
        <div>
          <div class="hero-badge">Live Leaderboard</div>
          <h1 class="hero-title">🏆 الترتيب المباشر</h1>
          <p class="hero-subtitle">يتحدث تلقائيًا كل 15 ثانية.</p>
        </div>
        <div class="hero-links">
          <a class="hero-link" href="index.html">⚽ التوقعات</a>
          <a class="hero-link" href="admin.html">🛠️ المشرف</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container-xl py-3 py-md-4">
    <div id="boardAlert"></div>

    <section class="stats-grid mb-3 mb-md-4">
      <article class="stat-card">
        <div class="stat-label">عدد المشاركين</div>
        <div class="stat-value" id="participantsCount">—</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">المتصدر الحالي</div>
        <div class="stat-value" id="leaderName">—</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">أعلى نقاط</div>
        <div class="stat-value" id="leaderPoints">—</div>
      </article>
      <article class="stat-card qr-card">
        <div class="stat-label">QR Code</div>
        <img id="boardQr" class="qr-img" alt="QR Code">
      </article>
    </section>

    <section class="section-head">
      <div>
        <h2 class="section-title">Top 5</h2>
        <p class="section-subtitle">جوائز تلقائية: الأول 30 ريال، الثاني 20 ريال، الثالث 10 ريال.</p>
      </div>
    </section>

    <div id="top5Cards" class="top5-grid mb-4"></div>

    <section class="glass-card mb-4">
      <div class="table-header">
        <h2 class="section-title mb-0">جدول الترتيب الكامل</h2>
        <div class="d-flex gap-2 flex-wrap">
          <button id="refreshBoardBtn" class="btn btn-soft-primary">تحديث الآن</button>
          <button id="downloadCsvBtn" class="btn btn-outline-primary">تصدير CSV</button>
        </div>
      </div>
      <div class="table-responsive mt-3">
        <table class="table table-app align-middle mb-0">
          <thead>
            <tr>
              <th>المركز</th>
              <th>الاسم</th>
              <th>النقاط</th>
              <th>عدد التوقعات</th>
              <th>النتائج الدقيقة</th>
              <th>أفضلية الجوائز</th>
            </tr>
          </thead>
          <tbody id="leaderboardTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/leaderboard.js"></script>
</body>
</html>
