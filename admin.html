<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة المشرف</title>

<link rel="stylesheet" href="assets/css/style.css?v=4">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js?v=4"></script>
<script src="assets/js/supabase-client.js?v=4"></script>
<script src="assets/js/common.js?v=4"></script>
</head>

<body>

<header class="hero">
  <div class="wrap">
    <div class="row">
      <div>
        <span class="badgex">Admin Panel ⚙️</span>
        <h1>لوحة المشرف 🛠️</h1>
        <p>إدخال النتائج يحدث الترتيب مباشرة عبر Realtime</p>
      </div>
      <div class="nav">
        <a href="index.html">التوقعات ⚽</a>
        <a href="leaderboard.html">الترتيب 🏆</a>
        <a href="tv.html">TV Top 5 📺</a>
      </div>
    </div>
  </div>
</header>

<main class="wrap">

  <div id="msg"></div>

  <!-- تسجيل دخول -->
  <div class="card">
    <h3>كلمة مرور الإدارة</h3>
    <input type="password" id="adminPass" placeholder="ادخل كلمة المرور">
    <br><br>
    <button class="btn btn-primary" onclick="login()">دخول</button>
  </div>

  <br>

  <!-- المباريات -->
  <div id="matches" style="display:none"></div>

  <br>

  <button id="saveBtn" class="btn btn-primary" style="display:none;width:100%">
    💾 حفظ النتائج
  </button>

</main>

<script>
let fixtures = [];
let isAdmin = false;

function login() {
  const pass = document.getElementById("adminPass").value;

  if (pass === APP_CONFIG.ADMIN_PASS) {
    isAdmin = true;
    loadData();
    document.getElementById("matches").style.display = "block";
    document.getElementById("saveBtn").style.display = "block";
    document.getElementById("msg").innerHTML = alertBox("success","تم الدخول بنجاح");
  } else {
    document.getElementById("msg").innerHTML = alertBox("danger","كلمة المرور خاطئة");
  }
}

async function loadData() {
  const { data, error } = await db.from("fixtures").select("*").order("kickoff_at");

  if (error) {
    document.getElementById("msg").innerHTML = alertBox("danger","خطأ في تحميل البيانات");
    return;
  }

  fixtures = data;
  render();
}

function render() {
  const el = document.getElementById("matches");
  el.innerHTML = "";

  fixtures.forEach(f => {
    el.innerHTML += `
    <div class="card">
      <h3>${f.home_team} vs ${f.away_team}</h3>

      <div class="score">
        <input id="ah-${f.id}" type="number" placeholder="هدف صاحب الأرض" value="${f.actual_home_goals ?? ""}">
        <input id="aa-${f.id}" type="number" placeholder="هدف الضيف" value="${f.actual_away_goals ?? ""}">
      </div>

      <br>

      <label><input type="checkbox" id="ex-${f.id}" ${f.went_extra_time ? "checked":""}> أشواط إضافية</label>
      <label><input type="checkbox" id="pn-${f.id}" ${f.went_penalties ? "checked":""}> ترجيح</label>

      <select id="pw-${f.id}">
        <option value="">الفائز بالترجيح</option>
        <option ${f.penalties_winner===f.home_team?"selected":""}>${f.home_team}</option>
        <option ${f.penalties_winner===f.away_team?"selected":""}>${f.away_team}</option>
      </select>

      <br><br>

      <label>وقت المباراة</label>
      <input type="datetime-local" id="ko-${f.id}" value="${toLocalInput(f.kickoff_at)}">

      <label>الإغلاق قبل (دقائق)</label>
      <input type="number" id="lk-${f.id}" value="${f.lock_minutes_before}">
    </div>
    `;
  });
}

function toLocalInput(iso) {
  const d = new Date(iso);
  d.setHours(d.getHours()+3); // توقيت السعودية
  return d.toISOString().slice(0,16);
}

document.getElementById("saveBtn").onclick = saveAll;

async function saveAll() {
  try {
    for (const f of fixtures) {

      const payload = {
        actual_home_goals: document.getElementById(`ah-${f.id}`).value === "" ? null : +document.getElementById(`ah-${f.id}`).value,
        actual_away_goals: document.getElementById(`aa-${f.id}`).value === "" ? null : +document.getElementById(`aa-${f.id}`).value,
        kickoff_at: new Date(document.getElementById(`ko-${f.id}`).value).toISOString(),
        lock_minutes_before: +document.getElementById(`lk-${f.id}`).value || 10,
        went_extra_time: document.getElementById(`ex-${f.id}`).checked,
        went_penalties: document.getElementById(`pn-${f.id}`).checked,
        penalties_winner: document.getElementById(`pw-${f.id}`).value || null
      };

      const { error } = await db
        .from("fixtures")
        .update(payload)
        .eq("id", f.id);

      if (error) throw error;
    }

    document.getElementById("msg").innerHTML =
      alertBox("success","✅ تم حفظ النتائج بنجاح والتحديث مباشر");

  } catch (e) {
    document.getElementById("msg").innerHTML =
      alertBox("danger","❌ تعذر حفظ النتائج: " + e.message);

    console.error(e);
  }
}
</script>

</body>
</html>
