<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>لوحة المشرف</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">⚽ توقعات دوري الأبطال</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="index.html">التوقعات</a>
        <a class="btn btn-outline-success btn-sm" href="leaderboard.html">الترتيب</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="adminAlertWrap"></div>

    <section id="authCard" class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h1 class="h4 mb-3">دخول المشرف</h1>
        <div class="row g-3">
          <div class="col-md-5">
            <label class="form-label">البريد الإلكتروني</label>
            <input id="adminEmail" class="form-control" type="email" placeholder="admin@example.com">
          </div>
          <div class="col-md-5">
            <label class="form-label">كلمة المرور</label>
            <input id="adminPassword" class="form-control" type="password" placeholder="••••••••">
          </div>
          <div class="col-md-2 d-grid">
            <label class="form-label opacity-0">.</label>
            <button id="adminLoginBtn" class="btn btn-dark">دخول</button>
          </div>
        </div>
      </div>
    </section>

    <section id="adminSection" class="d-none">
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
        <div>
          <h2 class="h4 mb-1">لوحة إدارة المسابقة</h2>
          <div class="small text-secondary">إدارة المباريات ونتائجها والتشكيلات وآخر 5 مباريات.</div>
        </div>
        <div class="d-flex gap-2">
          <button id="refreshAdminBtn" class="btn btn-outline-primary">تحديث</button>
          <button id="adminLogoutBtn" class="btn btn-outline-danger">خروج</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <section class="card shadow-sm border-0">
            <div class="card-body">
              <h3 class="h5 mb-3">إضافة مباراة إياب</h3>
              <div class="vstack gap-3">
                <div>
                  <label class="form-label">الفريق صاحب الأرض</label>
                  <input id="teamHome" class="form-control">
                </div>
                <div>
                  <label class="form-label">الفريق الضيف</label>
                  <input id="teamAway" class="form-control">
                </div>
                <div>
                  <label class="form-label">موعد المباراة</label>
                  <input id="kickoff" class="form-control" type="datetime-local">
                </div>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="form-label">نتيجة الذهاب - الأرض</label>
                    <input id="firstLegHome" class="form-control" type="number" min="0" max="20">
                  </div>
                  <div class="col-6">
                    <label class="form-label">نتيجة الذهاب - الضيف</label>
                    <input id="firstLegAway" class="form-control" type="number" min="0" max="20">
                  </div>
                </div>
                <div>
                  <label class="form-label">إغلاق قبل المباراة (دقائق)</label>
                  <input id="lockMinutes" class="form-control" type="number" min="0" value="10">
                </div>
                <div>
                  <label class="form-label">رابط المباراة</label>
                  <input id="matchUrl" class="form-control" placeholder="اختياري">
                </div>
                <div>
                  <label class="form-label">التشكيلة المتوقعة لصاحب الأرض</label>
                  <textarea id="lineupHome" class="form-control" rows="3" placeholder="سطر لكل لاعب أو صيغة مناسبة"></textarea>
                </div>
                <div>
                  <label class="form-label">التشكيلة المتوقعة للضيف</label>
                  <textarea id="lineupAway" class="form-control" rows="3"></textarea>
                </div>
                <div>
                  <label class="form-label">آخر 5 مباريات لصاحب الأرض</label>
                  <textarea id="last5Home" class="form-control" rows="2" placeholder='مثال: ["ف 2-1","ت 1-1","خ 0-1","ف 3-0","ف 1-0"]'></textarea>
                </div>
                <div>
                  <label class="form-label">آخر 5 مباريات للضيف</label>
                  <textarea id="last5Away" class="form-control" rows="2"></textarea>
                </div>
                <button id="addFixtureBtn" class="btn btn-primary">إضافة المباراة</button>
              </div>
            </div>
          </section>
        </div>

        <div class="col-lg-8">
          <section class="card shadow-sm border-0">
            <div class="card-body">
              <h3 class="h5 mb-3">المباريات الحالية</h3>
              <div id="adminFixturesList" class="vstack gap-3"></div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
